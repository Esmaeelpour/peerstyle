site_name: PeerStyle
site_description: Publication-quality Matplotlib styling for peer-reviewed journals.
site_url: https://esmaeelpour.github.io/peerstyle/
site_author: Javad Esmaeelpour
repo_url: https://github.com/Esmaeelpour/peerstyle
repo_name: Esmaeelpour/peerstyle
edit_uri: ""

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - navigation.indexes
    - content.code.copy
    - search.highlight
    - search.suggest

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Esmaeelpour/peerstyle
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/peerstyle/

copyright: Copyright &copy; 2024 Javad Esmaeelpour — MIT License

nav:
  - Home: index.md
  - Styles: styles.md
  - API Reference: api.md
  - Examples: examples.md
  - FAQ: faq.md
  - Changelog: changelog.md
